# fly.toml — GTA Lorcana Discord Bot

app = "gta-lorcana-bot"
primary_region = "yyz"

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "python bot.py"

[env]
  ANNOUNCEMENTS_CHANNEL = "announcements"
  RESULTS_CHANNEL       = "results"
  DECKLISTS_CHANNEL     = "decklists"
  WELCOME_CHANNEL       = "general"

# Required to prevent Fly.io from auto-stopping the machine
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1
  processes = ["app"]

  [[services.ports]]
    port = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1